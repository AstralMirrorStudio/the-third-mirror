function ascIdx(y,m,d,h,min){const j=new Date(2000,0,1,12);const now=new Date(y,m-1,d,h,min);const diff=(now-j)/86400000;const lst=(100.46+0.985647*diff+139.69+15*(h+min/60))%360;const lr=35.68*Math.PI/180;const ls=lst*Math.PI/180;let a=Math.atan2(Math.cos(ls),-(Math.sin(ls)*Math.cos(23.45*Math.PI/180)+Math.tan(lr)*Math.sin(23.45*Math.PI/180)))*180/Math.PI;if(a<0)a+=360;return Math.floor(a/30)%12}
function elemCompat(a,b){const ea=elem(a),eb=elem(b);if(ea===eb)return 75;const p=new Set([ea,eb]);if((p.has(0)&&p.has(2)))return 90;if((p.has(1)&&p.has(3)))return 85;if((p.has(0)&&p.has(3))||(p.has(1)&&p.has(2)))return 45;return 55}

function planetLon(now,planet){const j=new Date(2000,0,1,12);const d=(now-j)/86400000;const lons={Sun:280.460+0.985647*d,Moon:218.316+13.176396*d,Mercury:252.251+4.092317*d,Venus:181.979+1.602136*d,Mars:355.433+0.524039*d,Jupiter:34.351+0.083056*d,Saturn:50.077+0.033459*d};let l=lons[planet]%360;if(l<0)l+=360;return l}
function todayPlanets(){
  const now=new Date();
  const ps=[{key:'Sun',ja:'太陽',en:'Sun',es:'Sol',sym:'☀'},{key:'Moon',ja:'月',en:'Moon',es:'Luna',sym:'☽'},{key:'Mercury',ja:'水星',en:'Mercury',es:'Mercurio',sym:'☿'},{key:'Venus',ja:'金星',en:'Venus',es:'Venus',sym:'♀'},{key:'Mars',ja:'火星',en:'Mars',es:'Marte',sym:'♂'},{key:'Jupiter',ja:'木星',en:'Jupiter',es:'Júpiter',sym:'♃'},{key:'Saturn',ja:'土星',en:'Saturn',es:'Saturno',sym:'♄'}];
  return ps.map(p=>({...p,lon:planetLon(now,p.key)}));
}
function planetAspects(planets,si,mi,ai){
  const natal=[{sym:'☀',name:signName(si),lon:si*30+15},{sym:'☽',name:signName(mi),lon:mi*30+15},{sym:'↑',name:signName(ai),lon:ai*30}];
  const result=[];
  planets.forEach(p=>{natal.forEach(n=>{let diff=Math.abs(p.lon-n.lon)%360;if(diff>180)diff=360-diff;let aName=null,aSym=null,isH=true;
    if(diff<=8){aName=lang==='ja'?'コンジャンクション':lang==='en'?'Conjunction':'Conjunción';aSym='☌';isH=true}
    else if(Math.abs(diff-60)<=6){aName=lang==='ja'?'セクスタイル':lang==='en'?'Sextile':'Sextil';aSym='✶';isH=true}
    else if(Math.abs(diff-90)<=8){aName=lang==='ja'?'スクエア':lang==='en'?'Square':'Cuadratura';aSym='□';isH=false}
    else if(Math.abs(diff-120)<=8){aName=lang==='ja'?'トライン':lang==='en'?'Trine':'Trígono';aSym='△';isH=true}
    else if(Math.abs(diff-180)<=8){aName=lang==='ja'?'オポジション':lang==='en'?'Opposition':'Oposición';aSym='☍';isH=false}
    if(aName)result.push({p,n,aName,aSym,isH});
  })});return result;
}

// ── Navigation ──
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr-'+id).classList.add('active');
  window.scrollTo(0,0);
  renderCurrentScreen();
}
function renderCurrentScreen(){
  const active=document.querySelector('.screen.active');
  if(!active)return;
  const id=active.id.replace('scr-','');
  if(id==='home')renderHome();
  else if(id==='input')renderInput();
  else if(id==='result')renderResult();
  else if(id==='share')renderShareScreen();
  updateAllText();
}

// ── Mode ──
function setMode(m){
  mode=m;
  document.querySelectorAll('.mb').forEach((b,i)=>b.classList.toggle('on',i===m));

// ── Mirror Animation ──
let animFrame=null;
function startMirrorAnim(){
  const c=document.getElementById('mirrorCanvas');if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height;
  let t=0;
  const stars=Array.from({length:40},()=>({x:Math.random(),y:Math.random(),r:Math.random()*.8+.2,op:Math.random()*.4+.2}));
  function draw(){
    ctx.clearRect(0,0,w,h);
    const grd=ctx.createRadialGradient(w/2,h*.4,0,w/2,h/2,w*.55);
    grd.addColorStop(0,'#2A0A5C');grd.addColorStop(1,'#0A0C1C');
    ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.op*(0.6+0.4*Math.sin(t*2+s.x*10))})`;ctx.fill()});
    // Sun
    const sa=t*Math.PI*2;const sx=w/2+w*.28*Math.cos(sa),sy=h/2+h*.3*Math.sin(sa);
    ctx.beginPath();ctx.arc(sx,sy,10,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,.15)';ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,6,0,Math.PI*2);const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,6);sg.addColorStop(0,'#fff');sg.addColorStop(1,'#FFD700');ctx.fillStyle=sg;ctx.fill();
    // Moon
    const ma=t*Math.PI*2*.618+Math.PI*.85;const mx=w/2+w*.3*Math.cos(ma),my=h/2+h*.26*Math.sin(ma);
    ctx.beginPath();ctx.arc(mx,my,7,0,Math.PI*2);ctx.fillStyle='rgba(220,239,247,.85)';ctx.fill();
    ctx.beginPath();ctx.arc(mx+3.5,my-1.5,5.5,0,Math.PI*2);ctx.fillStyle='#0D0820';ctx.fill();
    // Center star
    ctx.fillStyle=`rgba(201,168,76,${.4+.15*Math.sin(t*3)})`;ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('✦',w/2,h/2+6);
    t+=0.008;animFrame=requestAnimationFrame(draw);
  }
  if(animFrame)cancelAnimationFrame(animFrame);draw();
}

function drawWheel(){
  const c=document.getElementById('wheelCanvas');if(!c)return;
  const ctx=c.getContext('2d');const w=c.width,h=c.height,cx=w/2,cy=h/2;
  const oR=w*.46,iR=w*.33,cR=w*.27;
  const EC=['#CC3333','#44AA44','#3366BB','#2233AA','#CC3333','#44AA44','#3366BB','#2233AA','#CC3333','#44AA44','#3366BB','#2233AA'];
  // Outer glow
  ctx.beginPath();ctx.arc(cx,cy,oR+8,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,.12)';ctx.filter='blur(8px)';ctx.fill();ctx.filter='none';
  // Segments
  for(let i=0;i<12;i++){
    const sa=(i*30-90)*Math.PI/180,sw=30*Math.PI/180;
    const sActual=(i+aAi)%12;
    ctx.beginPath();ctx.moveTo(cx+iR*Math.cos(sa),cy+iR*Math.sin(sa));
    ctx.arc(cx,cy,oR,sa,sa+sw);ctx.arc(cx,cy,iR,sa+sw,sa,-1);ctx.closePath();
    ctx.fillStyle=EC[sActual]+'99';ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+iR*Math.cos(sa),cy+iR*Math.sin(sa));ctx.lineTo(cx+oR*Math.cos(sa),cy+oR*Math.sin(sa));
    ctx.strokeStyle='rgba(10,12,28,.8)';ctx.lineWidth=1.2;ctx.stroke();
    const ma=sa+sw/2,sr=(oR+iR)/2;
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(SYMS[sActual],cx+sr*Math.cos(ma),cy+sr*Math.sin(ma));
  }
  // Rings
  ctx.beginPath();ctx.arc(cx,cy,oR,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.7)';ctx.lineWidth=1.8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,iR,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.25)';ctx.lineWidth=0.8;ctx.stroke();
  // Dots
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;ctx.beginPath();ctx.arc(cx+iR*Math.cos(a),cy+iR*Math.sin(a),2.5,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,.6)';ctx.fill();}
  // Center
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,cR);grd.addColorStop(0,'#1A0840');grd.addColorStop(1,'#0A0C1C');
  ctx.beginPath();ctx.arc(cx,cy,cR,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,cR,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.24)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lang==='ja'?'魂の':'Soul',cx,cy-7);ctx.fillText(lang==='ja'?'星図':'Chart',cx,cy+7);
  // ASC arrow
  ctx.beginPath();ctx.moveTo(cx,cy-iR*.05);ctx.lineTo(cx,cy-oR+2);ctx.strokeStyle='rgba(68,204,136,.85)';ctx.lineWidth=1.8;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-oR-4);ctx.lineTo(cx-5,cy-oR+7);ctx.lineTo(cx+5,cy-oR+7);ctx.closePath();ctx.fillStyle='#44CC88';ctx.fill();
  ctx.fillStyle='#44CC88';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('ASC',cx,cy-oR-16);
  // Planets
  drawPlanetOnWheel(ctx,cx,cy,aSi,aAi,cR,iR,'☀','#FFD700',19);
  drawPlanetOnWheel(ctx,cx,cy,aMi,aAi,cR,iR,'☽','#87CEEB',17);
}
function drawPlanetOnWheel(ctx,cx,cy,sIdx,aIdx,cR,iR,sym,col,fs){
  const slot=(sIdx-aIdx+12)%12;const a=(slot*30+15-90)*Math.PI/180;const r=(cR+iR)*.5;
  const px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);
  ctx.beginPath();ctx.arc(px,py,fs*.9,0,Math.PI*2);ctx.fillStyle=col+'44';ctx.fill();
  ctx.fillStyle=col;ctx.font=fs+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sym,px,py);
}

// ── Gauge ──
function drawGauge(score){
  const c=document.getElementById('gaugeCanvas');if(!c)return;
  const ctx=c.getContext('2d');const w=c.width,h=c.height,cx=w/2,cy=h/2,r=w/2-8;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*.8,Math.PI*.8);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=12;ctx.lineCap='round';ctx.stroke();
  const grd=ctx.createLinearGradient(0,0,w,0);grd.addColorStop(0,'#FFD700');grd.addColorStop(.5,'#87CEEB');grd.addColorStop(1,'#98FB98');
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*.8,-Math.PI*.8+Math.PI*1.6*(score/100));ctx.strokeStyle=grd;ctx.lineWidth=12;ctx.lineCap='round';ctx.stroke();
}

  return `

function planetLon(now,planet){const j=new Date(2000,0,1,12);const d=(now-j)/86400000;const lons={Sun:280.460+0.985647*d,Moon:218.316+13.176396*d,Mercury:252.251+4.092317*d,Venus:181.979+1.602136*d,Mars:355.433+0.524039*d,Jupiter:34.351+0.083056*d,Saturn:50.077+0.033459*d};let l=lons[planet]%360;if(l<0)l+=360;return l}
function todayPlanets(){
  const now=new Date();
  const ps=[{key:'Sun',ja:'太陽',en:'Sun',es:'Sol',sym:'☀'},{key:'Moon',ja:'月',en:'Moon',es:'Luna',sym:'☽'},{key:'Mercury',ja:'水星',en:'Mercury',es:'Mercurio',sym:'☿'},{key:'Venus',ja:'金星',en:'Venus',es:'Venus',sym:'♀'},{key:'Mars',ja:'火星',en:'Mars',es:'Marte',sym:'♂'},{key:'Jupiter',ja:'木星',en:'Jupiter',es:'Júpiter',sym:'♃'},{key:'Saturn',ja:'土星',en:'Saturn',es:'Saturno',sym:'♄'}];
  return ps.map(p=>({...p,lon:planetLon(now,p.key)}));
}
function planetAspects(planets,si,mi,ai){
  const natal=[{sym:'☀',name:signName(si),lon:si*30+15},{sym:'☽',name:signName(mi),lon:mi*30+15},{sym:'↑',name:signName(ai),lon:ai*30}];
  const result=[];
  planets.forEach(p=>{natal.forEach(n=>{let diff=Math.abs(p.lon-n.lon)%360;if(diff>180)diff=360-diff;let aName=null,aSym=null,isH=true;
    if(diff<=8){aName=lang==='ja'?'コンジャンクション':lang==='en'?'Conjunction':'Conjunción';aSym='☌';isH=true}
    else if(Math.abs(diff-60)<=6){aName=lang==='ja'?'セクスタイル':lang==='en'?'Sextile':'Sextil';aSym='✶';isH=true}
    else if(Math.abs(diff-90)<=8){aName=lang==='ja'?'スクエア':lang==='en'?'Square':'Cuadratura';aSym='□';isH=false}
    else if(Math.abs(diff-120)<=8){aName=lang==='ja'?'トライン':lang==='en'?'Trine':'Trígono';aSym='△';isH=true}
    else if(Math.abs(diff-180)<=8){aName=lang==='ja'?'オポジション':lang==='en'?'Opposition':'Oposición';aSym='☍';isH=false}
    if(aName)result.push({p,n,aName,aSym,isH});
  })});return result;
}

// ── Mirror Animation ──
let animFrame=null;
function startMirrorAnim(){
  const c=document.getElementById('mirrorCanvas');if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height;
  let t=0;
  const stars=Array.from({length:40},()=>({x:Math.random(),y:Math.random(),r:Math.random()*.8+.2,op:Math.random()*.4+.2}));
  function draw(){
    ctx.clearRect(0,0,w,h);
    const grd=ctx.createRadialGradient(w/2,h*.4,0,w/2,h/2,w*.55);
    grd.addColorStop(0,'#2A0A5C');grd.addColorStop(1,'#0A0C1C');
    ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.op*(0.6+0.4*Math.sin(t*2+s.x*10))})`;ctx.fill()});
    // Sun
    const sa=t*Math.PI*2;const sx=w/2+w*.28*Math.cos(sa),sy=h/2+h*.3*Math.sin(sa);
    ctx.beginPath();ctx.arc(sx,sy,10,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,.15)';ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,6,0,Math.PI*2);const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,6);sg.addColorStop(0,'#fff');sg.addColorStop(1,'#FFD700');ctx.fillStyle=sg;ctx.fill();
    // Moon
    const ma=t*Math.PI*2*.618+Math.PI*.85;const mx=w/2+w*.3*Math.cos(ma),my=h/2+h*.26*Math.sin(ma);
    ctx.beginPath();ctx.arc(mx,my,7,0,Math.PI*2);ctx.fillStyle='rgba(220,239,247,.85)';ctx.fill();
    ctx.beginPath();ctx.arc(mx+3.5,my-1.5,5.5,0,Math.PI*2);ctx.fillStyle='#0D0820';ctx.fill();
    // Center star
    ctx.fillStyle=`rgba(201,168,76,${.4+.15*Math.sin(t*3)})`;ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('✦',w/2,h/2+6);
    t+=0.008;animFrame=requestAnimationFrame(draw);
  }
  if(animFrame)cancelAnimationFrame(animFrame);draw();
}

function drawWheel(){
  const c=document.getElementById('wheelCanvas');if(!c)return;
  const ctx=c.getContext('2d');const w=c.width,h=c.height,cx=w/2,cy=h/2;
  const oR=w*.46,iR=w*.33,cR=w*.27;
  const EC=['#CC3333','#44AA44','#3366BB','#2233AA','#CC3333','#44AA44','#3366BB','#2233AA','#CC3333','#44AA44','#3366BB','#2233AA'];
  // Outer glow
  ctx.beginPath();ctx.arc(cx,cy,oR+8,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,.12)';ctx.filter='blur(8px)';ctx.fill();ctx.filter='none';
  // Segments
  for(let i=0;i<12;i++){
    const sa=(i*30-90)*Math.PI/180,sw=30*Math.PI/180;
    const sActual=(i+aAi)%12;
    ctx.beginPath();ctx.moveTo(cx+iR*Math.cos(sa),cy+iR*Math.sin(sa));
    ctx.arc(cx,cy,oR,sa,sa+sw);ctx.arc(cx,cy,iR,sa+sw,sa,-1);ctx.closePath();
    ctx.fillStyle=EC[sActual]+'99';ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+iR*Math.cos(sa),cy+iR*Math.sin(sa));ctx.lineTo(cx+oR*Math.cos(sa),cy+oR*Math.sin(sa));
    ctx.strokeStyle='rgba(10,12,28,.8)';ctx.lineWidth=1.2;ctx.stroke();
    const ma=sa+sw/2,sr=(oR+iR)/2;
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(SYMS[sActual],cx+sr*Math.cos(ma),cy+sr*Math.sin(ma));
  }
  // Rings
  ctx.beginPath();ctx.arc(cx,cy,oR,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.7)';ctx.lineWidth=1.8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,iR,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.25)';ctx.lineWidth=0.8;ctx.stroke();
  // Dots
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;ctx.beginPath();ctx.arc(cx+iR*Math.cos(a),cy+iR*Math.sin(a),2.5,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,.6)';ctx.fill();}
  // Center
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,cR);grd.addColorStop(0,'#1A0840');grd.addColorStop(1,'#0A0C1C');
  ctx.beginPath();ctx.arc(cx,cy,cR,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,cR,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.24)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lang==='ja'?'魂の':'Soul',cx,cy-7);ctx.fillText(lang==='ja'?'星図':'Chart',cx,cy+7);
  // ASC arrow
  ctx.beginPath();ctx.moveTo(cx,cy-iR*.05);ctx.lineTo(cx,cy-oR+2);ctx.strokeStyle='rgba(68,204,136,.85)';ctx.lineWidth=1.8;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-oR-4);ctx.lineTo(cx-5,cy-oR+7);ctx.lineTo(cx+5,cy-oR+7);ctx.closePath();ctx.fillStyle='#44CC88';ctx.fill();
  ctx.fillStyle='#44CC88';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('ASC',cx,cy-oR-16);
  // Planets
  drawPlanetOnWheel(ctx,cx,cy,aSi,aAi,cR,iR,'☀','#FFD700',19);
  drawPlanetOnWheel(ctx,cx,cy,aMi,aAi,cR,iR,'☽','#87CEEB',17);
}
function drawPlanetOnWheel(ctx,cx,cy,sIdx,aIdx,cR,iR,sym,col,fs){
  const slot=(sIdx-aIdx+12)%12;const a=(slot*30+15-90)*Math.PI/180;const r=(cR+iR)*.5;
  const px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);
  ctx.beginPath();ctx.arc(px,py,fs*.9,0,Math.PI*2);ctx.fillStyle=col+'44';ctx.fill();
  ctx.fillStyle=col;ctx.font=fs+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sym,px,py);
}

function drawGauge(score){
  const c=document.getElementById('gaugeCanvas');if(!c)return;
  const ctx=c.getContext('2d');const w=c.width,h=c.height,cx=w/2,cy=h/2,r=w/2-8;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*.8,Math.PI*.8);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=12;ctx.lineCap='round';ctx.stroke();
  const grd=ctx.createLinearGradient(0,0,w,0);grd.addColorStop(0,'#FFD700');grd.addColorStop(.5,'#87CEEB');grd.addColorStop(1,'#98FB98');
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*.8,-Math.PI*.8+Math.PI*1.6*(score/100));ctx.strokeStyle=grd;ctx.lineWidth=12;ctx.lineCap='round';ctx.stroke();
}

function renderShareScreen(){
  document.getElementById('share-text-display').innerHTML=shareText.replace(/\\n/g,'<br>');
}
function copyShare(){
  const text=shareText.replace(/\\n/g,'\\n');
  if(navigator.clipboard){navigator.clipboard.writeText(text);}
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast(t('copied'));
}
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none'},3000);
}

// ── Stars background ──
function initStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    s.style.cssText=`width:${Math.random()*2+.5}px;height:${Math.random()*2+.5}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
}

// ── Init ──
window.addEventListener('DOMContentLoaded',()=>{
